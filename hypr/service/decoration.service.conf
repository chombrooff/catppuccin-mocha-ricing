decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 4
        passes = 1
        contrast = 0.7
        brightness = 0.8
        noise = 0.01
        popups = true
        popups_ignorealpha = 0.6
    }

    drop_shadow = true
    shadow_range = 10
    shadow_render_power = 3
    col.shadow = rgba(0,0,0,0.4)
    shadow_ignore_window = true
}
