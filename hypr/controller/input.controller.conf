input {
    kb_layout = us
    kb_options = ctrl:nocaps
    follow_mouse = 1
    mouse_refocus = false
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        clickfinger_behavior = true
        tap-to-click = true
        drag_lock = true
        scroll_factor = 0.5
    }
}

cursor {
    no_hardware_cursors = false
    no_break_fs_vrr = false
    min_scale = 0.25
    max_scale = 3
    zoom_factor = 2.0
    default_monitor = 0
}
